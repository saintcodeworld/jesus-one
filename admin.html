<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jesus Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
      min-height: 100vh;
    }
    .holy-glow {
      box-shadow: 0 0 30px rgba(251, 191, 36, 0.3), 0 0 60px rgba(251, 191, 36, 0.1);
    }
    .divine-input {
      background: rgba(30, 27, 75, 0.8);
      border: 1px solid rgba(251, 191, 36, 0.3);
      transition: all 0.3s ease;
    }
    .divine-input:focus {
      border-color: rgba(251, 191, 36, 0.6);
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
    }
    .holy-button {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      transition: all 0.3s ease;
    }
    .holy-button:hover {
      background: linear-gradient(135deg, #d97706, #b45309);
      box-shadow: 0 0 25px rgba(251, 191, 36, 0.4);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .pulse {
      animation: pulse 2s infinite;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <!-- Login Screen -->
  <div id="login-screen" class="max-w-md w-full">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-amber-300 mb-2 tracking-wider">Admin Login</h1>
      <p class="text-amber-200/70 text-lg">Enter password to continue</p>
    </div>
    <div class="bg-black/40 backdrop-blur-lg rounded-2xl p-8 border border-amber-500/20 holy-glow">
      <form id="login-form" class="space-y-6">
        <div>
          <label for="admin-password" class="block text-amber-300/80 text-sm font-medium mb-2">Password</label>
          <input
            type="password"
            id="admin-password"
            placeholder="Enter admin password..."
            class="w-full px-4 py-3 rounded-lg text-amber-100 placeholder-amber-400/40 divine-input outline-none"
            required
            autofocus
          />
        </div>
        <div id="login-error" class="hidden text-red-400 text-sm"></div>
        <button type="submit" class="w-full holy-button text-white font-semibold py-3 px-6 rounded-lg">Enter</button>
      </form>
    </div>
  </div>

  <!-- Admin Panel (hidden until login) -->
  <div id="admin-panel" class="max-w-2xl w-full" style="display:none;">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-amber-300 mb-2 tracking-wider">Admin Panel</h1>
      <p class="text-amber-200/70 text-lg">Submit Questions for Jesus</p>
      <div class="mt-4 flex items-center justify-center gap-2">
        <div class="w-2 h-2 bg-amber-400 rounded-full pulse"></div>
        <span id="connection-status" class="text-amber-300/80 text-sm">Connecting to server...</span>
      </div>
    </div>

    <!-- Main Form -->
    <div class="bg-black/40 backdrop-blur-lg rounded-2xl p-8 border border-amber-500/20 holy-glow">
      <form id="question-form" class="space-y-6">
        <!-- Username Input -->
        <div>
          <label for="username" class="block text-amber-300/80 text-sm font-medium mb-2">
            Username (from Pump.fun)
          </label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter the username from Pump.fun chat..."
            class="w-full px-4 py-3 rounded-lg text-amber-100 placeholder-amber-400/40 divine-input outline-none"
            required
          />
        </div>

        <!-- Question Input -->
        <div>
          <label for="question" class="block text-amber-300/80 text-sm font-medium mb-2">
            Question
          </label>
          <textarea
            id="question"
            name="question"
            rows="4"
            placeholder="Type the question asked in Pump.fun chat..."
            class="w-full px-4 py-3 rounded-lg text-amber-100 placeholder-amber-400/40 divine-input outline-none resize-none"
            required
          ></textarea>
        </div>

        <!-- Submit Button -->
        <div class="flex gap-4">
          <button
            type="submit"
            id="submit-btn"
            class="flex-1 holy-button text-white font-semibold py-3 px-6 rounded-lg"
          >
            Submit Question
          </button>
          <button
            type="button"
            id="clear-btn"
            class="px-6 py-3 rounded-lg border border-amber-500/30 text-amber-300/80 hover:bg-amber-500/10 transition-all"
          >
            Clear
          </button>
        </div>
      </form>

      <!-- Loading Indicator -->
      <div id="loading" class="hidden mt-6 text-center">
        <div class="inline-flex items-center gap-2 text-amber-300/70">
          <div class="w-4 h-4 border-2 border-amber-400/30 border-t-amber-400 rounded-full animate-spin"></div>
          <span>Processing question...</span>
        </div>
      </div>

      <!-- Success/Error Messages -->
      <div id="message" class="hidden mt-6 p-4 rounded-lg text-sm"></div>
    </div>

    <!-- Recent Questions -->
    <div class="mt-8 bg-black/40 backdrop-blur-lg rounded-2xl p-6 border border-amber-500/20">
      <h2 class="text-xl font-semibold text-amber-300 mb-4">Recent Questions</h2>
      <div id="recent-questions" class="space-y-3 max-h-64 overflow-y-auto">
        <p class="text-amber-200/50 text-sm">No questions submitted yet.</p>
      </div>
    </div>

    <!-- Instructions -->
    <div class="mt-6 text-center text-amber-200/60 text-sm">
      <p>Copy questions from Pump.fun live chat and paste them here.</p>
      <p>Jesus will respond and display in the main web UI.</p>
    </div>
  </div>

  <script>
    // DOM elements
    const form = document.getElementById('question-form');
    const usernameInput = document.getElementById('username');
    const questionInput = document.getElementById('question');
    const submitBtn = document.getElementById('submit-btn');
    const clearBtn = document.getElementById('clear-btn');
    const loading = document.getElementById('loading');
    const message = document.getElementById('message');
    const recentQuestions = document.getElementById('recent-questions');
    const connectionStatus = document.getElementById('connection-status');

    // State
    let recentQuestionsList = [];
    let adminPassword = '';

    // Login
    const loginScreen = document.getElementById('login-screen');
    const adminPanel = document.getElementById('admin-panel');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const passwordInput = document.getElementById('admin-password');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = passwordInput.value.trim();
      if (!pw) return;

      // Verify password with a test request
      try {
        const res = await fetch('/api/admin-question', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw, question: '__auth_check__', username: 'auth' }),
        });
        if (res.status === 401) {
          loginError.textContent = 'Wrong password. Try again.';
          loginError.classList.remove('hidden');
          passwordInput.value = '';
          passwordInput.focus();
          return;
        }
      } catch (err) {
        loginError.textContent = 'Cannot reach server.';
        loginError.classList.remove('hidden');
        return;
      }

      adminPassword = pw;
      loginScreen.style.display = 'none';
      adminPanel.style.display = 'block';
      checkConnection();
      usernameInput.focus();
    });

    // Check connection
    async function checkConnection() {
      try {
        const response = await fetch('/api/config');
        if (response.ok) {
          connectionStatus.textContent = 'Connected to server';
          connectionStatus.className = 'text-green-400/80 text-sm';
        } else {
          throw new Error('Server not responding');
        }
      } catch (error) {
        connectionStatus.textContent = 'Connection error';
        connectionStatus.className = 'text-red-400/80 text-sm';
      }
    }

    // Show message
    function showMessage(text, type = 'success') {
      message.textContent = text;
      message.className = `mt-6 p-4 rounded-lg text-sm ${
        type === 'success' 
          ? 'bg-green-500/20 border border-green-500/30 text-green-300' 
          : 'bg-red-500/20 border border-red-500/30 text-red-300'
      }`;
      message.classList.remove('hidden');
      
      setTimeout(() => {
        message.classList.add('hidden');
      }, 5000);
    }

    // Add question to recent list
    function addQuestionToList(username, question, response) {
      recentQuestionsList.unshift({ username, question, response, timestamp: new Date() });
      if (recentQuestionsList.length > 10) {
        recentQuestionsList = recentQuestionsList.slice(0, 10);
      }
      updateRecentQuestionsDisplay();
    }

    // Update recent questions display
    function updateRecentQuestionsDisplay() {
      if (recentQuestionsList.length === 0) {
        recentQuestions.innerHTML = '<p class="text-amber-200/50 text-sm">No questions submitted yet.</p>';
        return;
      }

      recentQuestions.innerHTML = recentQuestionsList.map((item, index) => `
        <div class="bg-black/30 rounded-lg p-3 border border-amber-500/10">
          <div class="flex justify-between items-start mb-2">
            <span class="text-amber-300/80 font-medium text-sm">${item.username}</span>
            <span class="text-amber-200/40 text-xs">${new Date(item.timestamp).toLocaleTimeString()}</span>
          </div>
          <div class="text-amber-100/70 text-sm mb-2">Q: ${item.question}</div>
          ${item.response ? `<div class="text-amber-200/60 text-sm italic">A: ${item.response}</div>` : ''}
        </div>
      `).join('');
    }

    // Submit question
    async function submitQuestion(e) {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const question = questionInput.value.trim();
      
      if (!username || !question) {
        showMessage('Please fill in both username and question fields.', 'error');
        return;
      }

      // Show loading
      loading.classList.remove('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const response = await fetch('/api/admin-question', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, question, password: adminPassword }),
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Question submitted successfully! Jesus is responding...', 'success');
          addQuestionToList(username, question, data.response);
          form.reset();
          questionInput.focus();
        } else {
          showMessage(data.error || 'Failed to submit question', 'error');
        }
      } catch (error) {
        console.error('Submit error:', error);
        showMessage('Failed to connect to server', 'error');
      } finally {
        // Hide loading
        loading.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Question';
      }
    }

    // Clear form
    function clearForm() {
      form.reset();
      questionInput.focus();
    }

    // Event listeners
    form.addEventListener('submit', submitQuestion);
    clearBtn.addEventListener('click', clearForm);

    // Initialize
    checkConnection();
    setInterval(checkConnection, 30000); // Check connection every 30 seconds
    usernameInput.focus();
  </script>
</body>
</html>

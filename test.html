<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesus Response Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-purple-400">🙏 Jesus Response Tester</h1>
    
    <div class="bg-gray-800 rounded-lg p-6 mb-6">
      <p class="text-gray-300 mb-4">Test the Jesus response system manually. Questions will appear in the 3D experience.</p>
      
      <form id="testForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Username</label>
          <input 
            type="text" 
            id="username" 
            value="TestUser"
            class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-white"
          />
        </div>
        
        <div>
          <label class="block text-sm font-medium mb-2">Question</label>
          <input 
            type="text" 
            id="question" 
            placeholder="What is the meaning of life?"
            class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-white"
          />
        </div>
        
        <button 
          type="submit"
          class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded transition"
        >
          Send Question
        </button>
      </form>
      
      <div id="status" class="mt-4 text-sm"></div>
    </div>
    
    <div class="bg-gray-800 rounded-lg p-6">
      <h2 class="text-xl font-semibold mb-4 text-purple-300">Response History</h2>
      <div id="responses" class="space-y-3"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('testForm');
    const status = document.getElementById('status');
    const responses = document.getElementById('responses');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const question = document.getElementById('question').value;
      
      if (!question) {
        status.textContent = '❌ Please enter a question';
        status.className = 'mt-4 text-sm text-red-400';
        return;
      }
      
      status.textContent = '⏳ Sending...';
      status.className = 'mt-4 text-sm text-yellow-400';
      
      try {
        const res = await fetch('/api/test-question', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, question })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          status.textContent = '✅ Response sent to 3D experience!';
          status.className = 'mt-4 text-sm text-green-400';
          
          // Add to history
          const div = document.createElement('div');
          div.className = 'bg-gray-700 rounded p-3 border-l-4 border-purple-500';
          div.innerHTML = `
            <div class="text-xs text-purple-300 font-semibold mb-1">${username}</div>
            <div class="text-sm mb-2">${question}</div>
            <div class="text-sm text-yellow-200 italic">✝ ${data.response}</div>
          `;
          responses.insertBefore(div, responses.firstChild);
          
          // Clear question
          document.getElementById('question').value = '';
        } else {
          status.textContent = `❌ Error: ${data.error}`;
          status.className = 'mt-4 text-sm text-red-400';
        }
      } catch (err) {
        status.textContent = `❌ Error: ${err.message}`;
        status.className = 'mt-4 text-sm text-red-400';
      }
    });
  </script>
</body>
</html>

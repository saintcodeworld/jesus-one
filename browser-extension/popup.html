<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      background: rgba(255, 255, 255, 0.15);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .info {
      font-size: 13px;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 6px;
      margin-top: 8px;
    }
    .info strong {
      color: #fbbf24;
    }
    a {
      color: #fbbf24;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .footer {
      margin-top: 12px;
      font-size: 11px;
      opacity: 0.7;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🙏 Jesus Responder</h1>
  
  <div class="status">
    <div>
      <span class="status-dot"></span>
      <strong>Active</strong>
    </div>
    <div style="font-size: 12px; margin-top: 6px; opacity: 0.9;">
      Monitoring pump.fun chat
    </div>
  </div>

  <div class="info">
    <strong>How it works:</strong><br>
    1. Visit your coin on <a href="https://pump.fun" target="_blank">pump.fun</a><br>
    2. Users type: <strong>jesus &lt;question&gt;</strong><br>
    3. Jesus responds in the <a href="http://localhost:3000" target="_blank">3D experience</a>
  </div>

  <div class="footer">
    Make sure backend is running on localhost:3000
  </div>
</body>
</html>
